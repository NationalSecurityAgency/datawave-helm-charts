apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: ./rabbitmq
      sourceRef:
        kind: GitRepository
        name: datawave-helm-charts
        namespace: flux-system
      interval: 5m
  values: {}
